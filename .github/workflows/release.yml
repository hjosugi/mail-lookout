name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create (e.g. v1.2.3)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Build release manifest
        run: bun run build
        env:
          ADDIN_HOST_URL: https://mail-lookout.netlify.app

      - name: Best-effort validate release manifest
        continue-on-error: true
        run: bunx office-addin-manifest validate dist/manifest.xml

      - name: Prepare release asset
        run: cp dist/manifest.xml mail-lookout-manifest.xml

      - name: Create release and upload manifest
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          # On manual dispatch the tag may not exist yet; create it at this
          # commit. On a tag push the tag already exists and --target is ignored.
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" \
              --target "$GITHUB_SHA" \
              --title "mail-lookout $TAG" \
              --notes "Download mail-lookout-manifest.xml and sideload it in Outlook."
          gh release upload "$TAG" mail-lookout-manifest.xml --clobber
