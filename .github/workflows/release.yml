name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Build release manifest
        run: bun run build
        env:
          ADDIN_HOST_URL: https://mail-lookout.netlify.app

      - name: Best-effort validate release manifest
        continue-on-error: true
        run: bunx office-addin-manifest validate dist/manifest.xml

      - name: Prepare release asset
        run: cp dist/manifest.xml mail-lookout-manifest.xml

      - name: Create release and upload manifest
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          gh release view "$tag" >/dev/null 2>&1 || \
            gh release create "$tag" \
              --title "mail-lookout $tag" \
              --notes "Download mail-lookout-manifest.xml and sideload it in Outlook."
          gh release upload "$tag" mail-lookout-manifest.xml --clobber
